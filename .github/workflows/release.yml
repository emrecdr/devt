name: Release

# Triggered when a v* tag is pushed. Extracts the matching CHANGELOG.md section
# and publishes a GitHub release with those notes. Tag format: vX.Y.Z (semver).
# Pre-release tags (containing '-', e.g. v1.0.0-rc1) are flagged as prereleases.
#
# All step-output values are passed through env: rather than direct ${{ }}
# interpolation in run: blocks. Tag names are user-controllable and could
# otherwise be a shell-injection vector. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches VERSION file
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          VFILE=$(tr -d '[:space:]' < VERSION)
          if [ "$VFILE" != "$VERSION" ]; then
            echo "Tag $TAG does not match VERSION file ($VFILE)"
            exit 1
          fi

      - name: Skip if release already exists
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping (likely backfilled manually)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        if: steps.existing.outputs.skip != 'true'
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES_FILE="$(mktemp)"
          if ! bash scripts/extract-changelog.sh "$VERSION" > "$NOTES_FILE"; then
            echo "No CHANGELOG.md section for $VERSION"
            exit 1
          fi
          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          NOTES_FILE: ${{ steps.notes.outputs.file }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          LATEST_FLAG="--latest=false"
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          else
            # Promote to "Latest" only when $TAG is the highest semver across
            # existing stable releases (prereleases excluded). Guards against
            # retags of older versions or hotfixes of older series stealing
            # the Latest flag from a higher-versioned release.
            HIGHEST=$(gh release list --limit 100 --exclude-pre-releases --json tagName \
              --jq '[.[].tagName] + [env.TAG]
                    | map(ltrimstr("v"))
                    | map(select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$")))
                    | sort_by(split(".") | map(tonumber))
                    | last')
            if [ "v$HIGHEST" = "$TAG" ]; then
              LATEST_FLAG="--latest=true"
            fi
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            $LATEST_FLAG \
            $PRERELEASE_FLAG
