# Phase-gate registry.
#
# Single source of truth for which gates must pass before entering a given
# phase under a given workflow_type. The `state advance-phase <phase>` CLI
# reads this file, looks up the gates for the target phase under the current
# workflow.yaml::workflow_type, runs each gate in declared order via the
# existing assert-* functions, and refuses to advance on any failure (mode:
# block default per config.claim_check_mode, mirroring the dispatch-hygiene
# pattern).
#
# Why phase-gates instead of transition-gates: simpler. Each phase has gates
# that must pass to ENTER. The previous phase doesn't matter — the gates
# verify the work-state needed to BE in the target phase, matching the
# architecture where finalize-time gates check work-product regardless of
# which transition led there.
#
# Scope (v0.73 initial): the FINAL-DEACTIVATION phase per workflow_type (the
# `complete` / `debug` deactivation step). Workflow .md files invoke
# `state advance-phase complete active=false` at the end; this YAML declares
# which gates must pass first. v0.72's inline gate-check bash blocks remain
# as belt-and-suspenders during the transition cadence — v0.74 cleanup
# removes them once cal #19+ confirms the YAML path catches everything.
# Untracked phases auto-pass — advance-phase falls through to a plain phase
# update without running any gates, preserving backwards compatibility.
#
# Scope extension (Round 11 D-5): every INTERMEDIATE phase under each
# workflow_type now gates `assert-no-raw-dispatches-this-session`. Field
# signal (greenfield cal #24): 62 raw_dispatches accumulated across
# dispatch_lanes → substance_check_lanes → redispatch_lanes → consolidate
# mid-workflow with no enforcement until terminal `complete`. Combined with
# R10-1's `state update phase=X status=DONE` gate-firing + R10-4's
# kill-threshold, the bypass pattern now trips at the THIRD raw_dispatch on
# whatever intermediate phase boundary the orchestrator hits next — not at
# finalize.
#
# Why intermediate phases get ONLY the raw-dispatch gate (not the full
# terminal set): the other terminal gates (assert-knowledge-candidates-tagged,
# assert-auto-curator-considered, assert-verifier-ran, assert-claim-checks-
# resolved) check work-products that don't exist mid-workflow — e.g.,
# assert-verifier-ran is meaningless until verify phase produces
# verification.json. Gating those mid-workflow would block every intermediate
# transition with false positives. The raw-dispatch gate is the one signal
# universally relevant at every phase boundary.

workflow_types:
  code_review:
    # Intermediate phases — raw-dispatch gate only (R11 D-5)
    scope_check:
      gates:
        - assert-no-raw-dispatches-this-session
    context_init:
      gates:
        - assert-no-raw-dispatches-this-session
    review:
      gates:
        - assert-no-raw-dispatches-this-session
    verify:
      gates:
        - assert-no-raw-dispatches-this-session
    present_findings:
      gates:
        - assert-no-raw-dispatches-this-session
    # Terminal phase — full gate set
    complete:
      gates:
        - assert-claim-checks-resolved
        - assert-no-raw-dispatches-this-session
        - assert-knowledge-candidates-tagged
        - assert-auto-curator-considered
        - assert-verifier-ran

  code_review_parallel:
    # Intermediate phases — raw-dispatch gate only (R11 D-5)
    context_init:
      gates:
        - assert-no-raw-dispatches-this-session
    partition_lanes:
