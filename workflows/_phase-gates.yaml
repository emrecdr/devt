# Phase-gate registry.
#
# Single source of truth for which gates must pass before entering a given
# phase under a given workflow_type. The `state advance-phase <phase>` CLI
# reads this file, looks up the gates for the target phase under the current
# workflow.yaml::workflow_type, runs each gate in declared order via the
# existing assert-* functions, and refuses to advance on any failure (mode:
# block default per config.claim_check_mode, mirroring the dispatch-hygiene
# pattern).
#
# Why phase-gates instead of transition-gates: simpler. Each phase has gates
# that must pass to ENTER. The previous phase doesn't matter — the gates
# verify the work-state needed to BE in the target phase, matching the
# architecture where finalize-time gates check work-product regardless of
# which transition led there.
#
# Scope (initial): the FINAL-DEACTIVATION phase per workflow_type (the
# `complete` / `debug` deactivation step). Workflow .md files invoke
# `state advance-phase complete active=false` at the end; this YAML declares
# which gates must pass first. Inline gate-check bash blocks remain as
# belt-and-suspenders during the transition cadence — removed once field
# coverage confirms the YAML path catches everything. Untracked phases
# auto-pass — advance-phase falls through to a plain phase update without
# running any gates, preserving backwards compatibility.
#
# Scope extension: every INTERMEDIATE phase under each workflow_type gates
# `assert-no-raw-dispatches-this-session`. Field-observed: raw_dispatches
# can accumulate across dispatch_lanes → substance_check_lanes →
# redispatch_lanes → consolidate mid-workflow with no enforcement until
# terminal `complete` if intermediate phases are ungated. Combined with the
# `state update phase=X status=DONE` gate-firing path and the kill-threshold
# (config: dispatch_hygiene_kill_threshold), the bypass pattern now trips at
# the threshold count on whatever intermediate phase boundary the
# orchestrator hits next — not deferred to finalize.
#
# Why intermediate phases get ONLY the raw-dispatch gate (not the full
# terminal set): the other terminal gates (assert-knowledge-candidates-tagged,
# assert-auto-curator-considered, assert-verifier-ran, assert-claim-checks-
# resolved) check work-products that don't exist mid-workflow — e.g.,
# assert-verifier-ran is meaningless until verify phase produces
# verification.json. Gating those mid-workflow would block every intermediate
# transition with false positives. The raw-dispatch gate is the one signal
# universally relevant at every phase boundary.

workflow_types:
  code_review:
    # Intermediate phases — raw-dispatch gate only
    scope_check:
      gates:
        - assert-no-raw-dispatches-this-session
    context_init:
      gates:
        - assert-no-raw-dispatches-this-session
    review:
      gates:
        - assert-no-raw-dispatches-this-session
    verify:
      gates:
        - assert-no-raw-dispatches-this-session
    present_findings:
      gates:
        - assert-no-raw-dispatches-this-session
    # Terminal phase — full gate set
    complete:
      gates:
        - assert-claim-checks-resolved
        - assert-no-raw-dispatches-this-session
        - assert-knowledge-candidates-tagged
        - assert-auto-curator-considered
        - assert-verifier-ran

  code_review_parallel:
    # Intermediate phases — raw-dispatch gate only
    context_init:
      gates:
        - assert-no-raw-dispatches-this-session
    partition_lanes:
      gates:
        - assert-no-raw-dispatches-this-session
    dispatch_lanes:
      gates:
        - assert-no-raw-dispatches-this-session
    consolidate:
      gates:
        - assert-no-raw-dispatches-this-session
    verify:
      gates:
        - assert-no-raw-dispatches-this-session
    present_findings:
      gates:
        - assert-no-raw-dispatches-this-session
    # Terminal phase — full gate set
    complete:
      gates:
        - assert-claim-checks-resolved
        - assert-no-raw-dispatches-this-session
        - assert-knowledge-candidates-tagged
        - assert-auto-curator-considered
        - assert-verifier-ran

  dev:
    # Intermediate phases — raw-dispatch gate only
    assess:
      gates:
        - assert-no-raw-dispatches-this-session
    scan:
      gates:
        - assert-no-raw-dispatches-this-session
    plan:
      gates:
        - assert-no-raw-dispatches-this-session
    architect:
      gates:
        - assert-no-raw-dispatches-this-session
    implement:
      gates:
        - assert-no-raw-dispatches-this-session
    test:
      gates:
        - assert-no-raw-dispatches-this-session
    simplify:
      gates:
        - assert-no-raw-dispatches-this-session
    review:
      gates:
        - assert-no-raw-dispatches-this-session
    verify:
      gates:
        - assert-no-raw-dispatches-this-session
    docs:
      gates:
        - assert-no-raw-dispatches-this-session
    retro:
      gates:
        - assert-no-raw-dispatches-this-session
    autoskill:
      gates:
        - assert-no-raw-dispatches-this-session
    curate:
      gates:
        - assert-no-raw-dispatches-this-session
    finalize:
      gates:
        - assert-no-raw-dispatches-this-session
    # Terminal phase — full gate set
    complete:
      gates:
        - assert-claim-checks-resolved
        - assert-no-raw-dispatches-this-session
        - assert-knowledge-candidates-tagged
        # assert-auto-curator-considered is deliberately NOT here: the marker
        # (auto-curator-considered.txt) is written only by code-review's
        # auto_curator step, so requiring it hard-blocked dev finalize (dev never
        # writes it). dev enforces curation-consideration via the inline
        # assert-claude-mem-harvest in its unconditional harvest step. K213 locks this.
        # tier-aware: assertVerifierRan opts out (ok:true) for dev SIMPLE/TRIVIAL
        # (no verify step); requires verification.json for STANDARD/COMPLEX.
        - assert-verifier-ran

  quick_implement:
    # Intermediate phases — raw-dispatch gate only
    context_init:
      gates:
        - assert-no-raw-dispatches-this-session
    scan:
      gates:
        - assert-no-raw-dispatches-this-session
    implement:
      gates:
        - assert-no-raw-dispatches-this-session
    test:
      gates:
        - assert-no-raw-dispatches-this-session
    review:
      gates:
        - assert-no-raw-dispatches-this-session
    finalize:
      gates:
        - assert-no-raw-dispatches-this-session
    # Terminal phase — full gate set
    complete:
      gates:
        - assert-claim-checks-resolved
        - assert-no-raw-dispatches-this-session
        - assert-knowledge-candidates-tagged
        # assert-auto-curator-considered removed — same reason as dev.complete:
        # the marker is code-review-only; quick_implement enforces curation-
        # consideration via its own harvest_observations / assert-claude-mem-harvest.
        # K213 locks this.

  debug:
    # Intermediate phase — raw-dispatch gate only
    report:
      gates:
        - assert-no-raw-dispatches-this-session
    # Terminal phase — full gate set
    debug:
      gates:
        - assert-claim-checks-resolved
        - assert-no-raw-dispatches-this-session
        - assert-knowledge-candidates-tagged

  arch_health_scan:
    arch_health_scan:
      gates:
        - assert-claim-checks-resolved
        - assert-no-raw-dispatches-this-session

  docs:
    complete:
      gates:
        - assert-claim-checks-resolved
        - assert-no-raw-dispatches-this-session
