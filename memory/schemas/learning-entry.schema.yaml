required:
  - description
  - category
  - importance
  - confidence
  - tags
  - evidence
properties:
  description:
    type: string
    minLength: 20
    description: Imperative sentence — what to do or not do
  category:
    type: string
    description: Primary category (e.g., architecture, testing, error-handling, performance, security, workflow, tooling, debugging, patterns)
  importance:
    type: integer
    minimum: 1
    maximum: 10
  confidence:
    type: number
    minimum: 0.0
    maximum: 1.0
  decay_days:
    type: integer
    default: 90
    description: Days before re-evaluation (30 = volatile, 365 = stable principle)
  tags:
    type: string
    description: Comma-separated categories (e.g., "error-handling, reuse"). NOT a YAML array — must be a single-line string for semantic sync compatibility.
  evidence:
    type: string
    minLength: 10
    description: Concrete example from a real workflow that proved this lesson
  created_at:
    type: string
    description: ISO date string (added by curator during curation, not by retro)
