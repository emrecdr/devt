required:
  - description
  - category
  - importance
  - confidence
  - tags
  - evidence
properties:
  description:
    type: string
    minLength: 20
  category:
    type: string
    enum: [architecture, testing, performance, security, workflow, tooling, debugging, patterns]
  importance:
    type: integer
    minimum: 1
    maximum: 10
  confidence:
    type: number
    minimum: 0.0
    maximum: 1.0
  decay_days:
    type: integer
    default: 90
  tags:
    type: array
    items:
      type: string
  evidence:
    type: string
    minLength: 10
