# Skill Index — maps agents to their relevant technique skills
# Skills are auto-discovered by Claude via descriptions, but this
# provides explicit guidance for the workflow orchestrator.
#
# Tier buckets (resolved by init.cjs::resolveSkills against state.tier
# or detectTier(task) as initial seed):
#   skills          — always loaded, every dispatch regardless of tier
#   skills_standard — added when state.tier is STANDARD or COMPLEX
#   skills_complex  — added only when state.tier is COMPLEX
# Buckets are deduped on merge. User overrides at
# `.devt/config.json::agent_skills.<agent>` accept a flat array
# (= always loaded, ignores tier) — that path is preserved for stable
# project config.
#
# Disjointness invariant: buckets MUST NOT list a skill that already
# appears in the agent's frontmatter `skills:` (agents/<name>.md). The
# harness preloads frontmatter skills' full bodies at agent startup, so
# re-listing one here makes the agent Read ~5-14KB it already has in
# context. The smoke test asserts frontmatter ∩ buckets = ∅ per agent.
#
# Memory boundary (do not blur these):
# - scratchpad → EPHEMERAL within-workflow notes. Resets between
# workflows. Cross-agent handoff inside one run only.
# File: .devt/state/scratchpad.md
# - lesson-extraction → PERMANENT cross-workflow knowledge. Curated, scored,
# decay-tracked. Promoted from scratchpad when a finding
# is generalizable + actionable + evidence-based.
# Files: .devt/memory/lessons/*.md (LES-NNNN, curator-gated)
# If a finding only matters to the next agent in this workflow → scratchpad.
# If it would help a future workflow avoid the same mistake → lesson-extraction.

agents:
  programmer:
    skills:
      - scratchpad
    skills_standard:
      - tdd-patterns
      - verification-patterns
    skills_complex:
      - strategic-analysis
      - api-docs-fetcher
    reads:
      - .devt/rules/coding-standards.md
      - .devt/rules/architecture.md
      - .devt/rules/quality-gates.md

  tester:
    skills:
      - scratchpad
    reads:
      - .devt/rules/testing-patterns.md
      - .devt/rules/quality-gates.md

  code-reviewer:
    skills:
      - scratchpad
    skills_standard:
      - codebase-scan
    reads:
      - .devt/rules/coding-standards.md

  docs-writer:
    skills:
      - scratchpad
    reads:
      - .devt/rules/documentation.md

  architect:
    skills:
      - codebase-scan
    skills_standard:
      - api-docs-fetcher
    skills_complex:
      - architecture-health-scanner
      - strategic-analysis
      - complexity-assessment
    reads:
      - .devt/rules/architecture.md

  retro:
    skills:
      - lesson-extraction
    skills_complex:
      - autoskill
    reads:
      - .devt/state/*.md

  verifier:
    skills_standard:
      - codebase-scan
    reads:
      - .devt/rules/quality-gates.md
      - .devt/state/impl-summary.md
      - .devt/state/test-summary.md
      - .devt/state/review.md
      - .devt/state/plan.md

  researcher:
    skills_standard:
      - strategic-analysis
    reads:
      - .devt/rules/coding-standards.md
      - .devt/rules/architecture.md
      - .devt/state/decisions.md

  debugger:
    reads:
      - .devt/rules/coding-standards.md
      - .devt/rules/quality-gates.md
      - .devt/state/debug-context.md

  curator:
    skills_complex:
      - autoskill

workflows:
  dev-workflow:
    skills:
      - complexity-assessment
      - codebase-scan
  create-plan:
    skills:
      - codebase-scan
      - complexity-assessment
  quality-gates:
    skills: []
  weekly-report:
    skills:
      - weekly-report
