# Agent IO Contracts — single source of truth for per-agent inputs/outputs/skills.
#
# Three drift-prone surfaces currently live in three places:
#   1. agents/<name>.md frontmatter `skills:` field — what gets injected at agent startup
#   2. skill-index.yaml `agents.<name>.skills*` buckets — what the workflow orchestrator
#      adds via the `<agent_skills>` dispatch block
#   3. bin/modules/state.cjs::JSON_SIDECAR_SCHEMAS — which sidecar each agent owns
#
# This file declares the contract once. scripts/smoke-test.sh asserts the three
# surfaces agree with what's here. Adding a new agent means: append an entry,
# create agents/<name>.md, and the smoke test catches any miss.
#
# Schema per agent:
#   frontmatter_skills — list of `devt:<skill>` entries that MUST appear in
#                        agents/<name>.md frontmatter `skills:` (preloaded at
#                        agent startup; cannot be tier-filtered)
#   index_buckets      — list of bucket names (`skills`, `skills_standard`,
#                        `skills_complex`) the agent declares in skill-index.yaml.
#                        Smoke test asserts each declared bucket is non-empty in
#                        skill-index.yaml.
#   outputs:
#     primary          — the markdown artifact the agent writes (canonical
#                        human-readable record). Empty when the agent is a
#                        router/classifier and writes no artifact.
#     sidecar          — the JSON sidecar (if any) — MUST exist in state.cjs
#                        JSON_SIDECAR_SCHEMAS and SIDECAR_FOR_MARKDOWN
#     expected_sections — optional list of section heading titles (without
#                        the leading `## `) the primary artifact MUST contain.
#                        Derived from each agent's body declaration of what
#                        sections to write. Used by structural-drift validator
#                        (state.cjs::checkAgentOutput --structural) to catch
#                        dropped sections between sub-agent dispatches. Only
#                        meaningful when `validator.structural_mode != 'off'`
#                        in config; default is 'off' so this field is dormant
#                        until a calibration cycle confirms zero false
#                        positives. Sections beyond this list are permitted
#                        (superset semantics) — declare the MINIMUM common
#                        set across all valid output paths the agent takes.
#                        Omit for agents where output structure is
#                        intentionally flexible (docs, lessons, debug).
#   inputs:
#     context_blocks   — static blocks the workflow dispatch template MUST inject
#                        into <context>. Smoke test (future) asserts the dispatch
#                        actually references them.
#     graphify_inputs  — (V65-5) declares which graphify-derived context blocks
#                        the agent consumes. Subset of:
#                          scope_hint           — graphify-derived file list
#                          scope_trust          — staleness + sparsity signal
#                          graphify_status      — skip-awareness envelope
#                          god_node_warnings    — structured high-blast-radius hint
#                          graph_impact_md      — agent reads .devt/state/graph-impact.md
#                                                 directly (orchestrator-prepared)
#                        Empty list (or absent) means the agent is graphify-blind by
#                        design (e.g., curator, retro). Drift gate compares against
#                        actual dispatch templates + agent body parsing instructions.

agents:
  programmer:
    frontmatter_skills: [devt:memory-pre-flight, devt:codebase-scan]
    index_buckets: [skills, skills_standard, skills_complex]
    outputs:
      primary: impl-summary.md
      sidecar: impl-summary.json
      expected_sections: [Task, Files Modified, Key Decisions, Quality Gate Results, Provenance]
    inputs:
      context_blocks: [governing_rules, guardrails_inline, memory_signal, agent_skills, task, plan]
      graphify_inputs: [scope_hint, scope_trust, graph_impact_md]

  tester:
    frontmatter_skills: [devt:memory-pre-flight, devt:tdd-patterns]
    index_buckets: [skills, skills_standard]
    outputs:
      primary: test-summary.md
      sidecar: test-summary.json
      expected_sections: [Coverage, Test Files, Quality Gate Results, Provenance]
    inputs:
      context_blocks: [governing_rules, agent_skills, task]
      graphify_inputs: [scope_hint, scope_trust, graphify_status]

  code-reviewer:
    frontmatter_skills: [devt:memory-pre-flight, devt:code-review-guide]
    index_buckets: [skills, skills_standard]
    outputs:
      primary: review.md
      sidecar: review.json
      expected_sections: [Findings]
    inputs:
      context_blocks: [governing_rules, guardrails_inline, memory_signal, agent_skills, task]
      graphify_inputs: [scope_hint, scope_trust, graphify_status, god_node_warnings, graph_impact_md]

  docs-writer:
    frontmatter_skills: [devt:memory-pre-flight]
    index_buckets: [skills]
    outputs:
      primary: docs-summary.md
      sidecar: null
    inputs:
      context_blocks: [agent_skills, task]
      graphify_inputs: []

  architect:
    frontmatter_skills: [devt:memory-pre-flight, devt:graphify-helpers]
    index_buckets: [skills, skills_standard, skills_complex]
    outputs:
      primary: arch-review.md
      sidecar: null
    inputs:
      context_blocks: [governing_rules, agent_skills, task]
      graphify_inputs: [scope_hint, scope_trust]

  retro:
    frontmatter_skills: []
    index_buckets: [skills, skills_complex]
    outputs:
      primary: lessons.yaml
      sidecar: null
    inputs:
      context_blocks: [agent_skills]
      graphify_inputs: []

  verifier:
    frontmatter_skills: [devt:memory-pre-flight, devt:verification-patterns]
    index_buckets: [skills, skills_standard]
    outputs:
      primary: verification.md
      sidecar: verification.json
      expected_sections: [Task, Acceptance Criteria, Quality Gates, Summary]
    inputs:
      context_blocks: [governing_rules, memory_signal, agent_skills, rubric_path, workflow_type, task]
      graphify_inputs: [scope_hint, scope_trust, god_node_warnings]

  researcher:
    frontmatter_skills: [devt:memory-pre-flight, devt:codebase-scan]
    index_buckets: [skills, skills_standard]
    outputs:
      primary: research.md
      sidecar: null
    inputs:
      context_blocks: [governing_rules, agent_skills, task]
      graphify_inputs: [scope_hint, scope_trust]

  debugger:
    frontmatter_skills: [devt:memory-pre-flight, devt:codebase-scan]
    index_buckets: [skills]
    outputs:
      primary: debug-summary.md
      sidecar: null
    inputs:
      context_blocks: [agent_skills, bug]
      graphify_inputs: [scope_hint, scope_trust, graph_impact_md]

  curator:
    frontmatter_skills: [devt:memory-curation]
    index_buckets: [skills, skills_complex]
    outputs:
      primary: curation-summary.md
      sidecar: null
    inputs:
      context_blocks: [agent_skills]
      graphify_inputs: []
