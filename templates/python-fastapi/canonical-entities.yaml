# Canonical Entity Registry
# ==========================
#
# Drives the `canonical-entities` detector in arch-scan.py. Tells the detector
# which concepts (country, currency, language, calling-settings, …) have
# canonical entity models, what their FK shapes look like, and which ownership
# rules apply.
#
# Schema
# ------
# entities:
#   <concept_key>:
#     entity_status:        EXISTS | MISSING | ENUM
#     import_path:          dotted python path to the canonical class
#     canonical_file:       repo-relative path where the entity is defined
#     table_name:           SQL table backing the entity (optional)
#     pk_column:            primary-key column name (optional, default: id)
#     pk_type:              int | UUID | str (optional)
#     triggers:             list of field-name fragments that signal the concept
#     allowed_fk_columns:   list of FK column names that legitimately bind to
#                           this concept
#     forbid_string_only:   bool — flag bare `str | int` fields as missing FK
#     must_belong_to:       class name this concept's row MUST FK to (ownership)
#     forbid_owners:        list of class names this concept must NOT FK to
#     allowed_types:        list of acceptable annotation types (for ENUM)
#     denylist_paths:       list of file-path globs where this entity's
#                           triggers must NOT fire (use for cross-domain
#                           homonyms — e.g. OAuth `scope` per RFC-6749 vs
#                           RBAC RoleScope)
#
# Severity behavior
# -----------------
#   entity_status: EXISTS + forbid_string_only violation         → high
#   entity_status: EXISTS + forbid_owners hit                    → critical
#   entity_status: EXISTS + must_belong_to violated              → high
#   entity_status: MISSING + trigger fires                       → low (WARN)
#   FK present but graph shows no import (wiring-orphan)         → medium
#   Graph shows duplicate class definition (echo / shadow)       → medium
#
# Unknown keys are ignored — extend freely without breaking the detector.

version: 1

defaults:
  forbid_string_only: false
  fk_column_pattern: "{entity_name}_id"

entities:

  # --- Real entities -----------------------------------------------------

  country:
    entity_status: EXISTS
    import_path: app.services.countries.domain.models.Country
    canonical_file: app/services/countries/domain/models.py
    table_name: countries
    pk_column: id
    pk_type: int
    triggers:
      - country
      - country_code
      - country_name
      - billing_country
      - operational_country
    allowed_fk_columns:
      - country_id
      - billing_country_id
      - operational_country_id
    forbid_string_only: true

  client:
    entity_status: EXISTS
    import_path: app.services.clients.domain.models.Client
    canonical_file: app/services/clients/domain/models.py
    table_name: clients
    pk_column: id
    pk_type: UUID
    triggers:
      - client
    allowed_fk_columns:
      - client_id

  user:
    entity_status: EXISTS
    import_path: app.services.identity.domain.models.User
    canonical_file: app/services/identity/domain/models.py
    table_name: users
    pk_column: id
    pk_type: UUID
    triggers:
      - user
    allowed_fk_columns:
      - user_id
      - created_by
      - updated_by
      - assigned_by
      - initiator_user_id
      - actor_user_id

  organization:
    entity_status: EXISTS
    import_path: app.services.organizations.domain.models.Organization
    canonical_file: app/services/organizations/domain/models.py
    table_name: organization
    pk_column: id
    pk_type: UUID
    triggers:
      - organization
      - org_id
    allowed_fk_columns:
      - organization_id
      - parent_id

  role:
    entity_status: EXISTS
    import_path: app.services.identity.domain.models.Role
    canonical_file: app/services/identity/domain/models.py
    table_name: roles
    pk_column: id
    pk_type: UUID
    triggers:
      - role
    allowed_fk_columns:
      - role_id

  license:
    entity_status: EXISTS
    import_path: app.services.licences.domain.models.License
    canonical_file: app/services/licences/domain/models.py
    table_name: licenses
    pk_column: id
    pk_type: UUID
    triggers:
      - license
      - licence
    allowed_fk_columns:
      - license_id

  photo:
    entity_status: EXISTS
    import_path: app.services.photos.domain.models.Photo
    canonical_file: app/services/photos/domain/models.py
    triggers:
      - photo
      - album
    allowed_fk_columns:
      - photo_id
      - album_id

  # --- Conceptual entities (backed by another entity's ownership) --------

  calling_settings:
    entity_status: EXISTS
    import_path: app.services.clients.domain.models.Client
    canonical_file: app/services/clients/domain/models.py
    triggers:
      - calling_settings
      - video_call_settings
      - video_autoanswer
      - can_be_called
    must_belong_to: Client
    forbid_owners:
      - User

  # --- Enum-backed concepts ----------------------------------------------

  scope:
    entity_status: ENUM
    import_path: app.core.domain.enums.RoleScope
    triggers:
      - scope
      - role_scope
    allowed_types:
      - RoleScope
    forbid_string_only: true
    # OAuth-protocol `scope` (space-separated strings per RFC-6749) lives at
    # the external-calling boundary, NOT the RBAC layer. Suppress trigger
    # matches for files in that namespace so OAuth DTOs don't get advised
    # to use RoleScope.
    denylist_paths:
      - "app/services/external_calling/**"

  # --- Concepts without a canonical entity (surfaced as WARN) ------------

  # --- Enum-backed concepts (no DB table; StrEnum lives in code) ----------

  currency:
    entity_status: ENUM
    import_path: app.core.domain.enums.Currency
    triggers:
      - currency
      - currency_code
      - iso_currency
    allowed_types:
      - Currency
    forbid_string_only: true

  # --- Free strings (intentionally NOT modeled as entity or enum) ---------

  # Language codes follow ISO 639-1 and are stable; the project is i18n-light
  # so a Language enum or table would be overkill. Leaving as bare str.
  language:
    entity_status: MISSING
    triggers:
      - language
      - language_code
      - locale
    forbid_string_only: false
